<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AEM Desktop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <svg class="logo" viewBox="0 0 1024 1024" aria-label="AEM Desktop" role="img">
        <defs>
          <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FF4133" />
            <stop offset="1" stop-color="#D7000F" />
          </linearGradient>
        </defs>
        <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#tile)" />
        <g fill="none" stroke="#fff" stroke-width="104" stroke-linejoin="round" stroke-linecap="round">
          <path d="M300 792 L512 248 L724 792" />
          <path d="M398 596 L626 596" />
        </g>
      </svg>
      <h1>AEM Desktop</h1>
      <p class="tagline">Adobe Experience Manager &mdash; Edge Delivery Services</p>
      <p class="hmr">Hot reload is working &mdash; edited live at <span id="loaded">&hellip;</span></p>
      <p class="version">Version <span id="version">&hellip;</span></p>
    </main>
    <script type="module" src="renderer.js"></script>
  </body>
</html>
