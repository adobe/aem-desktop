name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    # macOS runner is required to build, sign and notarize the DMG.
    runs-on: macos-latest
    timeout-minutes: 40
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test

      - name: Release (semantic-release builds, signs & notarizes)
        env:
          # Admin-owned PAT, NOT the default GITHUB_TOKEN. The `main-protection`
          # ruleset requires the "Test" status check on every push to main, and
          # the github-actions[bot] is not a bypass actor — so the bot's push of
          # the `chore(release)` commit is rejected with GH013. The bypass list
          # already allows the Repository admin role, so a PAT owned by a repo
          # admin pushes the release commit/tag through. `[skip ci]` in the commit
          # message keeps this PAT push from triggering a recursive workflow run.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          # Developer ID Application certificate, base64-encoded .p12 + password.
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # Notarization credentials (Apple ID app-specific password flow).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx semantic-release
